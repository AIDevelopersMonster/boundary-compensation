<style>text{font-family:Arial;font-size:14px}.node{fill:white;stroke:#222;stroke-width:2}.edge{stroke:#222;stroke-width:2;marker-end:url(#arrow)}.frag{stroke-dasharray:6 4;stroke:#b55}.reset{stroke:#b00;stroke-width:2;stroke-dasharray:2 4}</style>
