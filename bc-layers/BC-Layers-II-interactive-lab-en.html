<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>BC-Layers II — Interactive Layer-Morphism Laboratory</title>
<style>
:root{--bg:#06101d;--panel:#0b1c31;--panel2:#102844;--ink:#edf4ff;--muted:#9eb3cf;--gold:#f4c96f;--cyan:#63dafd;--green:#74e39a;--red:#ff7d83;--orange:#ffb86b;--line:rgba(255,255,255,.13);--shadow:rgba(0,0,0,.35)}
*{box-sizing:border-box}body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at 12% 0%,#123a67 0%,var(--bg) 40%,#020711 100%);color:var(--ink)}
header{padding:28px 32px 22px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,rgba(255,255,255,.045),transparent)}
h1{margin:0;font-size:clamp(30px,4vw,52px);line-height:1.04;letter-spacing:-.035em}h1 span{color:var(--gold)}.subtitle{max-width:1120px;margin-top:12px;color:var(--muted);font-size:17px;line-height:1.55}.badge{display:inline-flex;padding:8px 12px;border:1px solid var(--line);border-radius:999px;color:var(--gold);background:rgba(255,255,255,.055);margin-bottom:14px}
.layout{display:grid;grid-template-columns:360px minmax(0,1fr);gap:18px;padding:18px}.panel{background:rgba(11,28,49,.94);border:1px solid var(--line);border-radius:18px;box-shadow:0 18px 48px var(--shadow);overflow:hidden}.controls{padding:18px;position:sticky;top:14px;align-self:start}.control{margin-bottom:17px}.control label{display:flex;justify-content:space-between;gap:12px;margin-bottom:8px;font-size:14px}.control label small{color:var(--gold);font-variant-numeric:tabular-nums}select,button{width:100%;background:#06182c;color:var(--ink);border:1px solid var(--line);border-radius:10px;padding:10px 12px}button{cursor:pointer;font-weight:700}input[type=range]{width:100%;accent-color:var(--cyan)}.check{display:flex;align-items:flex-start;gap:10px;margin:10px 0;color:var(--muted);font-size:14px;line-height:1.35}.check input{margin-top:3px;accent-color:var(--cyan)}.hint{padding:12px;border:1px solid var(--line);background:rgba(255,255,255,.04);border-radius:12px;color:var(--muted);font-size:13px;line-height:1.5}
.content{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px}.card{padding:18px;min-height:260px}.full{grid-column:1/-1}.card h2{margin:0 0 10px;font-size:21px;letter-spacing:-.02em}.card p{color:var(--muted);line-height:1.5}.formula{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;padding:12px;border:1px solid var(--line);border-radius:12px;background:rgba(0,0,0,.22);overflow:auto;line-height:1.6;color:#dbeafe}.flow{display:grid;grid-template-columns:1fr auto 1fr auto 1fr;gap:10px;align-items:stretch;margin-top:12px}.flowbox{border:1px solid var(--line);border-radius:14px;background:#07182b;padding:12px;min-width:0}.flowbox strong{display:block;color:var(--gold);font-size:13px;margin-bottom:7px}.arrow{display:grid;place-items:center;color:var(--cyan);font-size:24px}.matrixWrap{display:flex;justify-content:center;align-items:center;min-height:110px}.matrix{display:grid;gap:4px}.cell{width:52px;height:38px;border:1px solid rgba(255,255,255,.15);border-radius:7px;display:grid;place-items:center;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;background:#102b49}.scalar{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:18px;color:var(--cyan);padding:20px;text-align:center}.descriptorBox{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px;line-height:1.65;word-break:break-word}
.ledger{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:12px}.ledgerCol{border:1px solid var(--line);border-radius:14px;padding:12px;background:#07182b}.ledgerCol h3{margin:0 0 8px;font-size:14px}.ledgerCol.keep h3{color:var(--green)}.ledgerCol.loss h3{color:var(--red)}.ledgerCol ul{padding-left:18px;margin:0}.ledgerCol li{margin:7px 0;color:var(--muted)}
.statusGrid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-top:12px}.pill{border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.045);padding:10px;min-height:72px}.pill strong{display:block;color:var(--muted);font-size:12px;margin-bottom:6px}.pill span{font-size:16px;font-variant-numeric:tabular-nums}.ok span{color:var(--green)}.warn span{color:var(--gold)}.bad span{color:var(--red)}
.witnessGrid{display:grid;grid-template-columns:1fr 1fr;gap:14px}.tag{display:inline-flex;padding:7px 10px;border-radius:999px;border:1px solid var(--line);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px}.tag.ok{color:var(--green)}.tag.warn{color:var(--gold)}.note{padding:11px;border-left:3px solid var(--gold);background:rgba(244,201,111,.07);color:var(--muted);line-height:1.5;margin-top:12px}
canvas{display:block;width:100%;height:auto;background:#061427;border:1px solid var(--line);border-radius:14px}.legend{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-size:13px;margin-top:10px}.dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px}.stages{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;align-items:stretch}.stage{border:1px solid var(--line);border-radius:14px;background:#07182b;padding:12px}.stage h3{margin:0 0 8px;font-size:14px;color:var(--gold)}.meter{height:8px;background:#03101e;border-radius:999px;overflow:hidden;margin:9px 0}.meter span{display:block;height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:999px}.small{font-size:12px;color:var(--muted);line-height:1.45}.handoffGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px}.handoffItem{border:1px solid var(--line);border-radius:12px;padding:10px;background:#07182b}.handoffItem strong{display:block;color:var(--muted);font-size:12px;margin-bottom:5px}.handoffItem span{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:13px}.bigStatus{margin-top:12px;padding:14px;border-radius:14px;border:1px solid var(--line);font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:800;text-align:center;font-size:18px}.bigStatus.ready{color:var(--green);background:rgba(116,227,154,.08)}.bigStatus.blocked{color:var(--red);background:rgba(255,125,131,.08)}footer{padding:24px 32px 34px;color:var(--muted);text-align:center}
@media(max-width:1100px){.layout{grid-template-columns:1fr}.controls{position:static}.content{grid-template-columns:1fr}.full{grid-column:auto}.flow{grid-template-columns:1fr}.arrow{transform:rotate(90deg)}.statusGrid{grid-template-columns:repeat(2,1fr)}.stages{grid-template-columns:repeat(2,1fr)}}@media(max-width:650px){header{padding:22px 18px}.layout{padding:10px}.ledger,.witnessGrid,.handoffGrid,.stages{grid-template-columns:1fr}.statusGrid{grid-template-columns:1fr}.cell{width:45px}}
</style>
</head>
<body>
<header><div class="badge" id="badge"></div><h1 id="headline"></h1><div class="subtitle" id="subtitle"></div></header>
<main class="layout">
<aside class="panel controls">
<h2 id="controlsTitle"></h2>
<div class="control"><label><span id="compressionLabel"></span></label><select id="compression"><option value="projection" id="optProjection"></option><option value="schur" id="optSchur"></option><option value="channel" id="optChannel"></option></select></div>
<div class="control"><label><span id="recordingLabel"></span></label><select id="recording"><option value="full" id="optFull"></option><option value="spectrum" id="optSpectrum"></option><option value="rank" id="optRank"></option><option value="threshold" id="optThreshold"></option></select></div>
<div class="control"><label><span id="gLabel"></span><small id="gVal"></small></label><input id="g" type="range" min="0" max="2" value="0.8" step="0.05"></div>
<div class="control"><label><span id="hLabel"></span><small id="hVal"></small></label><input id="h" type="range" min="0" max="2" value="0.65" step="0.05"></div>
<div class="control"><label><span id="mLabel"></span><small id="mVal"></small></label><input id="m" type="range" min="-1" max="2" value="0.6" step="0.05"></div>
<div class="control"><label><span id="nLabel"></span><small id="nVal"></small></label><input id="n" type="range" min="0.5" max="4" value="2.2" step="0.1"></div>
<div class="control"><label><span id="deltaLabel"></span><small id="deltaVal"></small></label><input id="delta" type="range" min="0.05" max="1.5" value="0.4" step="0.05"></div>
<div class="control"><label><span id="etaLabel"></span><small id="etaVal"></small></label><input id="eta" type="range" min="0" max="0.5" value="0.08" step="0.01"></div>
<div class="control"><label><span id="timeLabel"></span><small id="timeVal"></small></label><input id="time" type="range" min="0.5" max="10" value="5" step="0.25"></div>
<label class="check"><input id="declaredClass" type="checkbox" checked><span id="declaredClassLabel"></span></label>
<label class="check"><input id="declaredTol" type="checkbox" checked><span id="declaredTolLabel"></span></label>
<label class="check"><input id="ledgerEnabled" type="checkbox" checked><span id="ledgerEnabledLabel"></span></label>
<button id="resetBtn"></button>
<div class="hint" id="controlHint"></div>
</aside>
<section class="content">
<article class="panel card full"><h2 id="protocolTitle"></h2><div class="formula"><span id="formulaLabel"></span>: <b>Π<sub>r</sub>(X)=R<sub>r</sub>(C<sub>r</sub>(X))</b></div><div class="flow"><div class="flowbox"><strong id="upperLabel"></strong><div id="upperMatrix" class="matrixWrap"></div></div><div class="arrow">→</div><div class="flowbox"><strong id="compressedLabel"></strong><div id="compressedMatrix" class="matrixWrap"></div></div><div class="arrow">→</div><div class="flowbox"><strong id="descriptorLabel"></strong><div id="descriptorValue" class="descriptorBox"></div></div></div><div class="statusGrid"><div class="pill"><strong>C<sub>r</sub></strong><span id="compressionStatus"></span></div><div class="pill"><strong>R<sub>r</sub></strong><span id="recordStatus"></span></div><div class="pill"><strong id="descriptorTypeLabel"></strong><span id="descriptorType"></span></div><div class="pill ok"><strong id="protocolStateLabel">Protocol</strong><span id="protocolState"></span></div></div></article>
<article class="panel card"><h2 id="ledgerTitle"></h2><div class="ledger"><div class="ledgerCol keep"><h3 id="retainedTitle"></h3><ul id="retainedList"></ul></div><div class="ledgerCol loss"><h3 id="lostTitle"></h3><ul id="lostList"></ul></div></div><div class="note" id="lossNote"></div></article>
<article class="panel card"><h2 id="witnessTitle"></h2><div id="witnessStatus" class="tag"></div><div class="witnessGrid" id="witnessGrid"><div><h3 id="matrixATitle"></h3><div id="matrixA" class="matrixWrap"></div><div class="small" id="propertyA"></div></div><div><h3 id="matrixBTitle"></h3><div id="matrixB" class="matrixWrap"></div><div class="small" id="propertyB"></div></div></div><div class="formula" id="sameDescriptor"></div><div class="note" id="witnessNote"></div></article>
<article class="panel card full"><h2 id="driftTitle"></h2><p id="driftIntro"></p><div class="formula" id="driftFormula"></div><canvas id="driftCanvas" width="1100" height="320"></canvas><div class="legend"><span><i class="dot" style="background:#63dafd"></i><span id="legendUpper"></span></span><span><i class="dot" style="background:#74e39a"></i><span id="legendLower"></span></span><span><i class="dot" style="background:#ff7d83"></i><span id="legendDrift"></span></span></div><div class="statusGrid"><div class="pill ok"><strong id="staticStatusLabel"></strong><span id="staticStatus"></span></div><div class="pill bad"><strong id="dynamicStatusLabel"></strong><span id="dynamicStatus"></span></div><div class="pill warn"><strong id="driftNormLabel"></strong><span id="driftValue"></span></div><div class="pill"><strong id="leakageLabel"></strong><span id="leakageValue"></span></div><div class="pill"><strong id="commutatorLabel"></strong><span id="commutatorValue"></span></div></div></article>
<article class="panel card full"><h2 id="sequenceTitle"></h2><div class="stages" id="stages"></div><div class="note" id="monotoneNote"></div></article>
<article class="panel card full"><h2 id="handoffTitle"></h2><p id="handoffText"></p><div class="handoffGrid"><div class="handoffItem"><strong id="upperClassLabel"></strong><span id="upperClassValue"></span></div><div class="handoffItem"><strong id="dataSpaceLabel"></strong><span id="dataSpaceValue"></span></div><div class="handoffItem"><strong id="morphismLabel"></strong><span>Π<sub>r</sub>=R<sub>r</sub>∘C<sub>r</sub></span></div><div class="handoffItem"><strong id="tolLabel"></strong><span id="tolValue"></span></div><div class="handoffItem"><strong>O<sub>keep</sub></strong><span id="handoffKeep"></span></div><div class="handoffItem"><strong>O<sub>lost</sub></strong><span id="handoffLost"></span></div></div><div id="handoffStatus" class="bigStatus"></div></article>
</section>
</main>
<footer id="footer"></footer>
<script>
const T={"lang": "en", "title": "BC-Layers II — Interactive Layer-Morphism Laboratory", "headline": "Compression, loss ledgers and evolution drift", "subtitle": "A self-contained interactive companion to BC-Layers II v0.1.1 reviewed clean. Separate structural compression C_r from recording R_r, inspect retained and discarded information, find loss witnesses, and audit dynamic compatibility before handoff to BC-M.", "badge": "Boundary Compensation / BC-Layers II", "controls": "Protocol controls", "compression": "Structural compression C_r", "projection": "Orthogonal compression to span{e₀,e₁}", "schur": "Schur/Feshbach elimination of e₂", "channel": "Single-channel compression to span{e₀}", "recording": "Recording rule R_r", "full": "Full compressed matrix", "spectrum": "Eigenvalue multiset only", "rank": "Rank only", "threshold": "Threshold-access status only", "g": "Retained coupling g", "h": "Hidden coupling h", "m": "Retained diagonal m", "n": "Hidden scale M", "delta": "Accessibility threshold δ", "eta": "Tolerance η", "time": "Time horizon T", "declaredClass": "Upper realization class declared", "declaredTol": "Threshold/tolerance declared", "ledgerEnabled": "Loss ledger completed", "reset": "Reset defaults", "protocol": "1. Observation protocol", "upper": "Upper object", "compressed": "Compressed carrier C_r(X)", "descriptor": "Recorded descriptor Π_r(X)=R_r(C_r(X))", "matrix": "matrix", "scalar": "scalar", "dimension": "dimension", "ledger": "2. Loss ledger", "retained": "RETAINED", "lost": "LOST / NOT RECORDED", "lossNote": "The ledger is protocol-relative: changing R_r changes the fiber even when C_r is unchanged.", "witness": "3. Loss witness", "sameDescriptor": "Same recorded descriptor", "differentProperty": "Different unrecorded property", "noWitness": "No nontrivial lower-carrier witness is produced when the full compressed matrix is recorded. Upper-layer information may still be lost by C_r.", "witnessFound": "LOSS_WITNESS_FOUND", "witnessNone": "NO_LOWER_WITNESS", "drift": "4. Evolution drift and leakage", "driftIntro": "Independent two-level audit block with D̂=[[0,g],[g,0]] and V=span{e₀}. Static compression gives A_eff=0, but the projected upper evolution equals cos(gt)P_V.", "staticStatus": "Static status", "dynamicStatus": "Dynamic status", "driftNorm": "Drift bound on [0,T]", "leakage": "Leakage norm", "commutator": "Commutator norm", "staticCertified": "STATIC_CERTIFIED", "driftZero": "DRIFT_ZERO", "driftBound": "DRIFT_BOUND", "leakPresent": "DYNAMIC_LEAKAGE_PRESENT", "sequence": "5. Sequential compression and monotone loss", "stageUpper": "Upper structure", "stageCarrier": "Compressed carrier", "stageDescriptor": "Recorded descriptor", "stageStatus": "Final status", "keptCount": "retained items", "lostCount": "lost items", "monotone": "Declared retained information cannot increase under later recording without an external probe or refinement morphism.", "handoff": "6. BC-M handoff package", "ready": "READY_FOR_BCM", "blocked": "HANDOFF_BLOCKED", "handoffText": "A BC-M fiber is well-defined only when the observation morphism, upper class, descriptor, loss ledger and tolerances are declared.", "upperClass": "Upper class", "dataSpace": "Data space", "morphism": "Observation morphism", "tol": "Resolution package", "status": "Status", "footer": "Educational and methodological demonstration. It does not claim hidden-reality reconstruction, physical dynamics, emergent spacetime, or empirical validation.", "fullMatrix": "full matrix entries", "spectrumItem": "spectrum", "trace": "trace", "determinant": "determinant", "rankItem": "rank", "thresholdItem": "threshold accessibility", "basis": "basis/eigenvector orientation", "hiddenCoord": "eliminated hidden coordinate", "hiddenCoupling": "hidden coupling data", "upperGeometry": "upper-layer geometry", "upperDynamics": "exact upper dynamics", "matrixEntries": "matrix entries", "signs": "signed matrix data", "exactValues": "exact eigenvalues", "multiplicity": "multiplicity pattern", "aboveThreshold": "count above threshold", "onlyStatus": "binary/access status", "notAudited": "not audited", "formula": "Protocol identity", "descriptorValue": "Descriptor value", "propertyA": "Property of A", "propertyB": "Property of B", "matrixA": "Candidate A", "matrixB": "Candidate B", "same": "same", "different": "different", "fullCarrierNote": "The full compressed carrier is retained; losses listed below come from the compression step itself.", "spectrumNote": "An orthogonal basis rotation changes entries and eigenvectors but preserves the eigenvalue multiset.", "rankNote": "Different spectra can have the same rank.", "thresholdNote": "Different eigenvalues can produce the same finite-resolution accessibility status.", "driftFormula": "Δ_V(t)=P_V e^{-itD̂}P_V−e^{-itA_eff}", "chartTime": "t", "chartDrift": "‖Δ_V(t)‖op", "compressionProjection": "Projection", "compressionSchur": "Schur/Feshbach", "compressionChannel": "Channel", "recordFull": "Full matrix", "recordSpectrum": "Spectrum", "recordRank": "Rank", "recordThreshold": "Threshold status", "protocolReady": "Protocol complete", "protocolIncomplete": "Complete all declarations", "effective": "A_eff", "descriptorType": "Descriptor type", "yes": "yes", "no": "no", "below": "below", "above": "above", "accessible": "accessible channels", "all": "all", "none": "none", "one": "one", "driftMax": "max drift", "range": "on [0,T]", "legendUpper": "projected upper evolution", "legendLower": "lower-layer evolution", "legendDrift": "operator drift", "readout": "readout", "preserves": "preserves", "discards": "discards", "formulaFull": "Π_r(X)=R_r(C_r(X))", "reencode": "No re-encoding or external probe is active."};
const $=id=>document.getElementById(id);
const fmt=x=>Math.abs(x)<1e-10?'0':(Math.round(x*1000)/1000).toFixed(3).replace(/\.000$/,'');
const state={};
function setText(id,key){$(id).textContent=T[key]}
function initText(){
setText('badge','badge');$('headline').innerHTML=T.headline.replace(/(loss ledgers|реестры потерь)/i,'<span>$1</span>');setText('subtitle','subtitle');setText('controlsTitle','controls');setText('compressionLabel','compression');setText('recordingLabel','recording');setText('optProjection','projection');setText('optSchur','schur');setText('optChannel','channel');setText('optFull','full');setText('optSpectrum','spectrum');setText('optRank','rank');setText('optThreshold','threshold');
['g','h','m','n','delta','eta','time'].forEach(k=>setText(k+'Label',k));setText('declaredClassLabel','declaredClass');setText('declaredTolLabel','declaredTol');setText('ledgerEnabledLabel','ledgerEnabled');setText('resetBtn','reset');$('controlHint').innerHTML='<b>'+T.formulaFull+'</b><br>'+T.reencode;
setText('protocolTitle','protocol');setText('formulaLabel','formula');setText('upperLabel','upper');setText('compressedLabel','compressed');setText('descriptorLabel','descriptor');setText('descriptorTypeLabel','descriptorType');setText('ledgerTitle','ledger');setText('retainedTitle','retained');setText('lostTitle','lost');setText('lossNote','lossNote');setText('witnessTitle','witness');setText('matrixATitle','matrixA');setText('matrixBTitle','matrixB');setText('driftTitle','drift');setText('driftIntro','driftIntro');setText('driftFormula','driftFormula');setText('legendUpper','legendUpper');setText('legendLower','legendLower');setText('legendDrift','legendDrift');setText('staticStatusLabel','staticStatus');setText('dynamicStatusLabel','dynamicStatus');setText('driftNormLabel','driftNorm');setText('leakageLabel','leakage');setText('commutatorLabel','commutator');setText('sequenceTitle','sequence');setText('monotoneNote','monotone');setText('handoffTitle','handoff');setText('handoffText','handoffText');setText('upperClassLabel','upperClass');setText('dataSpaceLabel','dataSpace');setText('morphismLabel','morphism');setText('tolLabel','tol');setText('footer','footer');
}
function eig2(A){const a=A[0][0],b=A[0][1],d=A[1][1],tr=a+d,disc=Math.sqrt((a-d)*(a-d)+4*b*b);return[(tr-disc)/2,(tr+disc)/2]}
function rankMatrix(A,tol=1e-8){if(A.length===1)return Math.abs(A[0][0])>tol?1:0;const det=A[0][0]*A[1][1]-A[0][1]*A[1][0];if(Math.abs(det)>tol)return 2;return A.flat().some(x=>Math.abs(x)>tol)?1:0}
function matHTML(A){if(typeof A==='number')return '<div class="scalar">'+fmt(A)+'</div>';const n=A.length;return '<div class="matrix" style="grid-template-columns:repeat('+n+',52px)">'+A.flat().map(v=>'<div class="cell">'+fmt(v)+'</div>').join('')+'</div>'}
function read(){['g','h','m','n','delta','eta','time'].forEach(k=>state[k]=parseFloat($(k).value));state.compression=$('compression').value;state.recording=$('recording').value;state.declaredClass=$('declaredClass').checked;state.declaredTol=$('declaredTol').checked;state.ledgerEnabled=$('ledgerEnabled').checked}
function upperMatrix(){return [[0,state.g,0],[state.g,state.m,state.h],[0,state.h,state.n]]}
function compressed(){if(state.compression==='channel')return [[0]];if(state.compression==='projection')return [[0,state.g],[state.g,state.m]];return [[0,state.g],[state.g,state.m-state.h*state.h/state.n]]}
function descriptor(A){const vals=A.length===1?[A[0][0]]:eig2(A);const r=rankMatrix(A);const acc=vals.filter(x=>Math.abs(x)>state.delta).length;if(state.recording==='full')return{type:T.full,html:T.matrix+' = '+JSON.stringify(A.map(row=>row.map(x=>+fmt(x))))};if(state.recording==='spectrum')return{type:T.spectrum,html:'σ = {'+vals.map(fmt).join(', ')+'}'};if(state.recording==='rank')return{type:T.rank,html:'rank = '+r};return{type:T.threshold,html:'N<sub>acc</sub>(δ) = '+acc+' / '+vals.length+'; δ='+fmt(state.delta)}}
function compressionName(){return state.compression==='projection'?T.compressionProjection:state.compression==='schur'?T.compressionSchur:T.compressionChannel}
function recordingName(){return state.recording==='full'?T.recordFull:state.recording==='spectrum'?T.recordSpectrum:state.recording==='rank'?T.recordRank:T.recordThreshold}
function ledger(){let keep=[],lost=[T.hiddenCoord,T.upperGeometry,T.upperDynamics];if(state.compression==='projection')lost.unshift(T.hiddenCoupling);if(state.compression==='channel')lost.unshift(T.matrixEntries,T.basis,T.spectrumItem);if(state.compression==='schur')keep.push('Schur correction −h²/M');
if(state.recording==='full')keep.push(T.fullMatrix,T.spectrumItem,T.trace,T.determinant,T.rankItem,T.thresholdItem);
if(state.recording==='spectrum'){keep.push(T.spectrumItem,T.trace,T.determinant,T.rankItem,T.thresholdItem);lost.unshift(T.matrixEntries,T.basis)}
if(state.recording==='rank'){keep.push(T.rankItem);lost.unshift(T.exactValues,T.trace,T.determinant,T.matrixEntries,T.basis)}
if(state.recording==='threshold'){keep.push(T.aboveThreshold,T.onlyStatus);lost.unshift(T.exactValues,T.multiplicity,T.rankItem,T.trace,T.determinant,T.matrixEntries,T.basis)}
return{keep:[...new Set(keep)],lost:[...new Set(lost)]}}
function renderList(id,arr){$(id).innerHTML=arr.map(x=>'<li>'+x+'</li>').join('')}
function rotate(A,theta){const c=Math.cos(theta),s=Math.sin(theta),R=[[c,-s],[s,c]];const mul=(X,Y)=>X.map((r,i)=>Y[0].map((_,j)=>r.reduce((q,v,k)=>q+v*Y[k][j],0)));const Rt=[[c,s],[-s,c]];return mul(mul(Rt,A),R)}
function witness(A){let B,propA,propB,note,status=T.witnessFound;if(state.recording==='full'){B=A;propA=T.fullCarrierNote;propB=T.fullCarrierNote;note=T.noWitness;status=T.witnessNone}
else if(state.recording==='spectrum'){if(A.length===1){B=A;propA=T.fullCarrierNote;propB=T.fullCarrierNote;note=T.noWitness;status=T.witnessNone}else{B=rotate(A,0.62);propA=T.matrixEntries+': '+JSON.stringify(A.map(r=>r.map(x=>+fmt(x))));propB=T.matrixEntries+': '+JSON.stringify(B.map(r=>r.map(x=>+fmt(x))));note=T.spectrumNote}}
else if(state.recording==='rank'){if(A.length===1){A=[[1]];B=[[2]];propA=T.spectrumItem+': {1}';propB=T.spectrumItem+': {2}'}else{A=[[1,0],[0,0]];B=[[2,0],[0,0]];propA=T.spectrumItem+': {0, 1}';propB=T.spectrumItem+': {0, 2}'}note=T.rankNote}
else{if(A.length===1){A=[[2*state.delta]];B=[[3*state.delta]];propA=T.spectrumItem+': {'+A[0][0].toFixed(2)+'}';propB=T.spectrumItem+': {'+B[0][0].toFixed(2)+'}'}else{A=[[0.5*state.delta,0],[0,2*state.delta]];B=[[0.8*state.delta,0],[0,3*state.delta]];propA=T.spectrumItem+': {'+A[0][0].toFixed(2)+', '+A[1][1].toFixed(2)+'}';propB=T.spectrumItem+': {'+B[0][0].toFixed(2)+', '+B[1][1].toFixed(2)+'}'}note=T.thresholdNote}
return{A,B,propA,propB,note,status}}
function drawDrift(){const c=$('driftCanvas'),ctx=c.getContext('2d'),W=c.width,H=c.height,pad=45,Tm=state.time,g=state.g;ctx.clearRect(0,0,W,H);ctx.fillStyle='#061427';ctx.fillRect(0,0,W,H);ctx.strokeStyle='rgba(255,255,255,.16)';ctx.lineWidth=1;for(let i=0;i<=5;i++){const y=pad+(H-2*pad)*i/5;ctx.beginPath();ctx.moveTo(pad,y);ctx.lineTo(W-pad,y);ctx.stroke()}ctx.strokeStyle='#71829a';ctx.beginPath();ctx.moveTo(pad,pad);ctx.lineTo(pad,H-pad);ctx.lineTo(W-pad,H-pad);ctx.stroke();ctx.fillStyle='#9eb3cf';ctx.font='13px system-ui';ctx.fillText('0',18,H-pad+5);ctx.fillText(T.chartTime, W-pad+12,H-pad+5);ctx.fillText(T.chartDrift,8,pad-12);
const plot=(fn,color,maxY=2)=>{ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();for(let i=0;i<=500;i++){const t=Tm*i/500,v=fn(t),x=pad+(W-2*pad)*i/500,y=H-pad-(H-2*pad)*v/maxY;i?ctx.lineTo(x,y):ctx.moveTo(x,y)}ctx.stroke()};plot(t=>Math.cos(g*t),'#63dafd',2);plot(t=>1,'#74e39a',2);plot(t=>Math.abs(1-Math.cos(g*t)),'#ff7d83',2)}
function driftMax(){const x=state.g*state.time;if(state.g===0)return 0;if(x>=Math.PI)return 2;return 1-Math.cos(x)}
function stages(led){const total=12,carrierKeep=state.compression==='channel'?3:7,descKeep=Math.max(1,led.keep.length),statusKeep=state.recording==='threshold'?1:Math.min(2,descKeep);const arr=[{t:T.stageUpper,k:total,l:0},{t:T.stageCarrier,k:carrierKeep,l:total-carrierKeep},{t:T.stageDescriptor,k:descKeep,l:total-descKeep},{t:T.stageStatus,k:statusKeep,l:total-statusKeep}];$('stages').innerHTML=arr.map(s=>'<div class="stage"><h3>'+s.t+'</h3><div class="meter"><span style="width:'+(100*s.k/total)+'%"></span></div><div class="small">'+s.k+' '+T.keptCount+'<br>'+s.l+' '+T.lostCount+'</div></div>').join('')}
function update(){read();['g','h','m','n','delta','eta','time'].forEach(k=>$(k+'Val').textContent=fmt(state[k]));const U=upperMatrix(),A=compressed(),D=descriptor(A),led=ledger();$('upperMatrix').innerHTML=matHTML(U);$('compressedMatrix').innerHTML=matHTML(A);$('descriptorValue').innerHTML='<b>'+T.descriptorValue+':</b><br>'+D.html;$('compressionStatus').textContent=compressionName();$('recordStatus').textContent=recordingName();$('descriptorType').textContent=D.type;const complete=state.declaredClass&&state.declaredTol&&state.ledgerEnabled;$('protocolState').textContent=complete?T.protocolReady:T.protocolIncomplete;$('protocolState').parentElement.className='pill '+(complete?'ok':'bad');renderList('retainedList',led.keep);renderList('lostList',led.lost);
const w=witness(A);$('witnessStatus').textContent=w.status;$('witnessStatus').className='tag '+(w.status===T.witnessFound?'warn':'ok');$('matrixA').innerHTML=matHTML(w.A);$('matrixB').innerHTML=matHTML(w.B);$('propertyA').textContent=w.propA;$('propertyB').textContent=w.propB;$('sameDescriptor').innerHTML='<b>'+T.sameDescriptor+':</b> '+descriptor(w.A).html+' = '+descriptor(w.B).html;$('witnessNote').textContent=w.note;drawDrift();const dm=driftMax();$('staticStatus').textContent=T.staticCertified;$('dynamicStatus').textContent=state.g===0?T.driftZero:T.leakPresent;$('driftValue').textContent=fmt(dm)+' '+T.range;$('leakageValue').textContent=fmt(Math.abs(state.g));$('commutatorValue').textContent=fmt(Math.abs(state.g));stages(led);
$('upperClassValue').textContent=state.declaredClass?'X̂_r = Herm₃ (declared)':T.notAudited;$('dataSpaceValue').textContent=state.recording==='full'?'D_r = compressed matrices':state.recording==='spectrum'?'D_r = spectral multisets':state.recording==='rank'?'D_r = {0,1,2}':'D_r = threshold statuses';$('tolValue').textContent=state.declaredTol?'δ='+fmt(state.delta)+', η='+fmt(state.eta):T.notAudited;$('handoffKeep').textContent=state.ledgerEnabled?led.keep.join('; '):T.notAudited;$('handoffLost').textContent=state.ledgerEnabled?led.lost.join('; '):T.notAudited;const hs=$('handoffStatus');hs.textContent=complete?T.ready:T.blocked;hs.className='bigStatus '+(complete?'ready':'blocked')}
function reset(){const v={g:.8,h:.65,m:.6,n:2.2,delta:.4,eta:.08,time:5};Object.entries(v).forEach(([k,x])=>$(k).value=x);$('compression').value='projection';$('recording').value='spectrum';$('declaredClass').checked=$('declaredTol').checked=$('ledgerEnabled').checked=true;update()}
initText();document.querySelectorAll('input,select').forEach(e=>e.addEventListener('input',update));$('resetBtn').addEventListener('click',reset);reset();
</script>
</body></html>
